<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 复习资料共享</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px; /* 手机端留白 */
        }
        .login-box {
            background: white;
            padding: 30px 20px; /* 手机端内边距 */
            border-radius: 16px;
            width: 100%;
            max-width: 400px; /* 手机端最大宽度 */
            box-shadow: 0 8px 30px rgba(0,0,0,0.1);
            margin: 20px 0;
        }
        .title {
            text-align: center;
            margin-bottom: 25px;
            color: #333;
            font-size: 20px; /* 手机端标题 */
        }
        .form-group {
            margin-bottom: 18px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #555;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 10px 12px; /* 手机端输入框 */
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: border 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .btn {
            width: 100%;
            padding: 12px; /* 手机端按钮 */
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            margin-top: 10px;
            transition: transform 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
        }
        .back {
            text-align: center;
            margin-top: 20px;
        }
        a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
        }
        a:hover {
            text-decoration: underline;
        }
        
        /* 电脑端适配（≥768px） */
        @media (min-width: 768px) {
            .login-box {
                padding: 40px;
                max-width: 450px;
            }
            .title {
                font-size: 24px;
                margin-bottom: 30px;
            }
            input {
                padding: 12px 15px;
                font-size: 16px;
            }
            .btn {
                padding: 14px;
                font-size: 16px;
            }
            a {
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h2 class="title">用户登录</h2>
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn">登录</button>
        </form>
        <div class="back">
            <a href="/">返回首页</a>
        </div>
    </div>
</body>
</html>
