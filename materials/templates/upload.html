<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>上传资料 - 复习资料共享</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Microsoft YaHei", sans-serif;
        }
        
        body {
            background-color: #f5f7fa;
        }
        
        /* 导航栏适配 */
        .navbar {
            background: white;
            padding: 0 15px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .nav-inner {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            height: 60px;
            width: 100%;
        }
        
        .nav-logo {
            font-size: 16px;
            font-weight: bold;
            color: #667eea;
            margin-right: 15px;
            text-decoration: none;
        }
        
        .nav-links {
            display: flex;
            gap: 8px;
        }
        
        .nav-link {
            padding: 8px 12px;
            border-radius: 20px;
            text-decoration: none;
            color: #666;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .nav-link:hover {
            background: #f0f0f0;
        }
        
        .nav-link.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        /* 主内容区适配 */
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 15px; /* 手机端内边距 */
            width: 100%;
        }
        
        .page-title {
            font-size: 24px; /* 手机端标题 */
            color: #333;
            margin-bottom: 30px;
            text-align: center;
        }
        
        /* 表单卡片适配 */
        .form-card {
            background: white;
            padding: 30px 20px; /* 手机端内边距 */
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
            max-width: 100%; /* 手机端宽度100% */
            margin: 0 auto;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 14px; /* 手机端字体 */
        }
        
        .form-input, .form-select {
            width: 100%;
            padding: 10px 15px; /* 手机端输入框 */
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px; /* 手机端字体 */
            outline: none;
            transition: all 0.3s;
        }
        
        .form-input:focus, .form-select:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        /* 文件选择框适配 */
        .form-file {
            padding: 8px;
            border: 1px dashed #e0e0e0;
            border-radius: 8px;
            background: #f9f9f9;
            cursor: pointer;
        }
        
        .submit-btn {
            width: 100%;
            padding: 12px; /* 手机端按钮 */
            border-radius: 8px;
            border: none;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 15px; /* 手机端字体 */
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        /* 电脑端适配（≥768px） */
        @media (min-width: 768px) {
            .navbar {
                padding: 0 30px;
            }
            .nav-logo {
                font-size: 20px;
                margin-right: 40px;
            }
            .nav-link {
                padding: 8px 20px;
                font-size: 15px;
            }
            .container {
                padding: 60px 30px;
            }
            .page-title {
                font-size: 28px;
            }
            .form-card {
                padding: 40px;
                max-width: 600px;
            }
            .form-label {
                font-size: 15px;
            }
            .form-input, .form-select {
                padding: 12px 15px;
                font-size: 15px;
            }
            .submit-btn {
                padding: 14px;
                font-size: 16px;
            }
        }
        
        /* 小屏手机（≤480px）优化 */
        @media (max-width: 480px) {
            .form-card {
                padding: 20px 15px;
            }
            .page-title {
                font-size: 22px;
                margin-bottom: 20px;
            }
            .nav-link {
                padding: 6px 8px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>

    <!-- 导航栏 -->
    <div class="navbar">
        <div class="nav-inner">
            <a href="/" class="nav-logo">📚 复习资料共享</a>
            <div class="nav-links">
                <a href="/" class="nav-link {% if request.path == '/' %}active{% endif %}">首页</a>
                <a href="/list/" class="nav-link {% if request.path == '/list/' %}active{% endif %}">资料列表</a>
                <a href="/upload/" class="nav-link {% if request.path == '/upload/' %}active{% endif %}">上传资料</a>
                
                {% if user.is_authenticated %}
                    <!-- 已登录：显示注销 + 用户名 -->
                    <a href="/logout/" class="nav-link">注销 ({{ user.username }})</a>
                {% else %}
                    <!-- 未登录：显示登录 + 注册 -->
                    <a href="/login/" class="nav-link">登录</a>
                    <a href="/register/" class="nav-link">注册</a>
                {% endif %}
            </div>
        </div>
    </div>

    <div class="container">
        <h1 class="page-title">上传复习资料</h1>
        <div class="form-card">
            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                
                <div class="form-group">
                    <label class="form-label">资料标题</label>
                    {{ form.title }}
                </div>

                <div class="form-group">
                    <label class="form-label">所属分类</label>
                    {{ form.category }}
                </div>

                <div class="form-group">
                    <label class="form-label">资料文件</label>
                    {{ form.file }}
                </div>

                <button type="submit" class="submit-btn">确认上传</button>
            </form>
        </div>
    </div>

</body>
</html>
